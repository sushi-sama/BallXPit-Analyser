<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BALL × PIT — Build Advisor</title>
  <meta name="description" content="AI-powered build advisor for the BALL x PIT roguelite game. Get optimal ball picks and evolution strategies." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & Tokens                                                     */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #06090f;
      --bg-base:    #0d1117;
      --bg-surface: rgba(255,255,255,0.03);
      --bg-raised:  rgba(255,255,255,0.06);
      --border:     rgba(255,255,255,0.08);
      --border-accent: rgba(255,200,50,0.3);
      --gold:       #ffd166;
      --gold-dim:   rgba(255,200,50,0.12);
      --gold-glow:  rgba(255,200,50,0.08);
      --text:       #e8edf3;
      --text-muted: #a8b3c4;
      --text-dim:   #5a6580;
      --danger:     #ff6b6b;
      --danger-bg:  rgba(255,80,80,0.08);
      --success:    #4ade80;
      --cyan:       #5ae8e8;
      --radius:     12px;
      --radius-sm:  8px;
      --font:       'Space Grotesk', sans-serif;
      --font-mono:  'Space Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ------------------------------------------------------------------ */
    /* Animated Background                                                */
    /* ------------------------------------------------------------------ */
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .bg-glow::before,
    .bg-glow::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .bg-glow::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #ffd166 0%, transparent 70%);
      top: -200px; left: -100px;
    }
    .bg-glow::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #5ae8e8 0%, transparent 70%);
      bottom: -150px; right: -100px;
      animation-delay: -10s;
    }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(80px, 60px) scale(1.15); }
    }

    /* ------------------------------------------------------------------ */
    /* Layout                                                             */
    /* ------------------------------------------------------------------ */
    .app {
      position: relative; z-index: 1;
      display: flex; justify-content: center;
      padding: 40px 20px 80px;
    }
    .container { width: 100%; max-width: 720px; }

    /* ------------------------------------------------------------------ */
    /* Header                                                             */
    /* ------------------------------------------------------------------ */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp .6s ease-out;
    }
    .header__eyebrow {
      font-size: 11px; font-weight: 600;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px;
    }
    .header__title {
      font-family: var(--font-mono);
      font-size: 32px; font-weight: 700;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--text) 40%, var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header__sub {
      color: var(--text-dim); font-size: 14px; margin-top: 10px;
    }

    /* ------------------------------------------------------------------ */
    /* Glass Panel                                                        */
    /* ------------------------------------------------------------------ */
    .panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      margin-bottom: 24px;
      animation: fadeUp .6s ease-out both;
    }
    .panel--delay1 { animation-delay: .1s; }
    .panel--delay2 { animation-delay: .2s; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 6px 0 22px;
    }

    /* ------------------------------------------------------------------ */
    /* Section Label                                                      */
    /* ------------------------------------------------------------------ */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .section-label__icon { font-size: 20px; }
    .section-label__text {
      font-size: 12px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ------------------------------------------------------------------ */
    /* Input Row                                                          */
    /* ------------------------------------------------------------------ */
    .input-row {
      display: flex; gap: 10px; margin-bottom: 10px;
    }
    .input-row input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-row input:focus {
      border-color: var(--border-accent);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }
    .input-row input::placeholder { color: var(--text-dim); }

    .btn-add {
      background: var(--gold-dim);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      color: var(--gold);
      font-size: 14px; font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }
    .btn-add:hover { background: rgba(255,200,50,0.18); transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* ------------------------------------------------------------------ */
    /* Ball Tags                                                          */
    /* ------------------------------------------------------------------ */
    .tags { display: flex; flex-wrap: wrap; gap: 8px; min-height: 28px; }
    .tag {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--gold-dim);
      border: 1px solid var(--border-accent);
      border-radius: 7px;
      padding: 5px 12px;
      font-size: 13px; color: var(--gold);
      animation: popIn .25s ease-out;
    }
    .tag__remove {
      background: none; border: none;
      color: var(--danger); cursor: pointer;
      font-size: 16px; line-height: 1; padding: 0;
      opacity: .7; transition: opacity .15s;
    }
    .tag__remove:hover { opacity: 1; }
    .tags__empty {
      color: rgba(255,255,255,0.2);
      font-size: 12px; font-style: italic;
      align-self: center;
    }

    /* ------------------------------------------------------------------ */
    /* CTA Button                                                         */
    /* ------------------------------------------------------------------ */
    .cta {
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, rgba(255,200,50,0.2), rgba(255,160,20,0.15));
      border: 1px solid rgba(255,200,50,0.45);
      border-radius: var(--radius);
      color: var(--gold);
      font-size: 15px; font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .25s;
      position: relative;
      overflow: hidden;
      animation: fadeUp .6s ease-out both;
      animation-delay: .25s;
    }
    .cta::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,200,50,0.08), transparent);
      opacity: 0;
      transition: opacity .3s;
    }
    .cta:hover::before { opacity: 1; }
    .cta:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,200,50,0.12); }
    .cta:active { transform: translateY(0); }
    .cta:disabled {
      background: rgba(255,200,50,0.06);
      color: #7a6820;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .cta:disabled::before { display: none; }

    /* ------------------------------------------------------------------ */
    /* Error Message                                                      */
    /* ------------------------------------------------------------------ */
    .error-msg {
      background: var(--danger-bg);
      border: 1px solid rgba(255,80,80,0.25);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 18px;
      animation: shake .4s ease-out;
    }

    /* ------------------------------------------------------------------ */
    /* Advice Card                                                        */
    /* ------------------------------------------------------------------ */
    .advice-card {
      margin-top: 28px;
      background: var(--bg-surface);
      border: 1px solid rgba(255,200,50,0.18);
      border-radius: 16px;
      padding: 28px;
      animation: fadeUp .5s ease-out;
    }
    .advice-card__label {
      font-size: 11px; font-weight: 600;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 16px;
    }
    .advice-card__body {
      color: #c8d6e8;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    /* ------------------------------------------------------------------ */
    /* Settings Toggle                                                    */
    /* ------------------------------------------------------------------ */
    .settings-toggle {
      display: flex; align-items: center; justify-content: flex-end;
      margin-bottom: 16px;
      animation: fadeUp .6s ease-out both;
    }
    .settings-toggle button {
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      color: var(--text-dim);
      font-size: 12px; font-family: var(--font);
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .settings-toggle button:hover {
      color: var(--text-muted);
      border-color: rgba(255,255,255,0.15);
    }

    .settings-panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      margin-bottom: 20px;
      animation: fadeUp .3s ease-out;
    }
    .settings-panel label {
      display: block;
      font-size: 11px; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .settings-panel input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-mono);
      outline: none;
      transition: border-color .2s;
    }
    .settings-panel input:focus {
      border-color: var(--border-accent);
    }
    .settings-panel .hint {
      margin-top: 6px;
      font-size: 11px; color: var(--text-dim);
    }

    /* ------------------------------------------------------------------ */
    /* Reference Accordion                                                */
    /* ------------------------------------------------------------------ */
    .reference {
      margin-top: 32px;
      animation: fadeUp .6s ease-out both;
      animation-delay: .3s;
    }
    .reference summary {
      cursor: pointer;
      color: var(--text-dim);
      font-size: 13px;
      user-select: none;
      padding: 10px 0;
      transition: color .2s;
      list-style: none;
    }
    .reference summary::-webkit-details-marker { display: none; }
    .reference summary::before {
      content: '▸'; margin-right: 8px;
      display: inline-block;
      transition: transform .2s;
    }
    .reference[open] summary::before { transform: rotate(90deg); }
    .reference summary:hover { color: var(--text-muted); }

    .ref-grid {
      display: flex; flex-direction: column; gap: 6px;
      margin-top: 14px;
      max-height: 500px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    .ref-card {
      background: rgba(255,255,255,0.02);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      transition: background .2s;
    }
    .ref-card:hover { background: rgba(255,255,255,0.05); }
    .ref-card__name {
      color: var(--gold); font-size: 12px; font-weight: 600;
    }
    .ref-card__combo {
      color: var(--cyan); font-size: 11px; margin-left: 10px;
    }
    .ref-card__desc {
      color: var(--text-dim); font-size: 11px; margin-top: 3px;
    }

    /* Tabs for reference */
    .ref-tabs {
      display: flex; gap: 4px; margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .ref-tab {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 11px; font-family: var(--font);
      color: var(--text-dim);
      cursor: pointer;
      transition: all .2s;
    }
    .ref-tab:hover { color: var(--text-muted); }
    .ref-tab.active {
      background: var(--gold-dim);
      border-color: var(--border-accent);
      color: var(--gold);
    }

    /* ------------------------------------------------------------------ */
    /* Top Picks Section                                                   */
    /* ------------------------------------------------------------------ */
    .top-picks-section {
      margin-bottom: 20px;
    }
    .top-picks-heading {
      font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .top-picks-heading--evo { color: var(--gold); }
    .top-picks-heading--fusion { color: #c084fc; }

    .top-picks-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .fusion-card {
      background: rgba(192, 132, 252, 0.04);
      border: 1px solid rgba(192, 132, 252, 0.12);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      transition: background .2s, border-color .2s;
    }
    .fusion-card:hover {
      background: rgba(192, 132, 252, 0.08);
      border-color: rgba(192, 132, 252, 0.25);
    }
    .fusion-card__names {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap;
    }
    .fusion-card__ball {
      color: #c084fc; font-size: 12px; font-weight: 600;
    }
    .fusion-card__x {
      color: var(--text-dim); font-size: 11px; font-weight: 700;
    }
    .fusion-card__tip {
      color: var(--text-dim); font-size: 11px; margin-top: 3px;
    }

    .evo-badge {
      display: inline-block;
      background: var(--gold-dim);
      border: 1px solid var(--border-accent);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 11px; font-weight: 600;
      color: var(--gold);
      transition: background .2s;
    }
    .evo-badge:hover { background: rgba(255,200,50,0.18); }

    .evo-badges {
      display: flex; flex-wrap: wrap; gap: 6px;
    }

    /* ------------------------------------------------------------------ */
    /* Loading Spinner                                                    */
    /* ------------------------------------------------------------------ */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,200,50,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ------------------------------------------------------------------ */
    /* Animations                                                         */
    /* ------------------------------------------------------------------ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(5px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(3px); }
    }

    /* ------------------------------------------------------------------ */
    /* Responsive                                                         */
    /* ------------------------------------------------------------------ */
    @media (max-width: 520px) {
      .header__title { font-size: 24px; }
      .panel { padding: 20px; }
      .input-row { flex-direction: column; }
      .btn-add { text-align: center; }
    }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="app">
  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="header__eyebrow">⚡ BALL × PIT</div>
      <h1 class="header__title">Build Advisor</h1>
      <p class="header__sub">Tell it what you have. Get the optimal pick.</p>
    </header>

    

    <!-- Input Panel -->
    <div class="panel panel--delay1">
      <!-- Current Balls -->
      <div class="section-label">
        <span class="section-label__icon">🎱</span>
        <span class="section-label__text">Your Current Balls</span>
      </div>
      <div class="input-row">
        <input type="text" id="current-input" list="ball-datalist"
               placeholder="Type a ball name and press Enter…"
               onkeydown="if(event.key==='Enter'){addBall('current')}" />
        <button class="btn-add" onclick="addBall('current')">+ Add</button>
      </div>
      <div class="tags" id="current-tags">
        <span class="tags__empty">None added yet</span>
      </div>

      <div class="divider"></div>

      <!-- Level-Up Options -->
      <div class="section-label">
        <span class="section-label__icon">🎯</span>
        <span class="section-label__text">Level-Up Options Offered</span>
      </div>
      <div class="input-row">
        <input type="text" id="levelup-input" list="ball-datalist"
               placeholder="What balls are being offered?"
               onkeydown="if(event.key==='Enter'){addBall('levelup')}" />
        <button class="btn-add" onclick="addBall('levelup')">+ Add</button>
      </div>
      <div class="tags" id="levelup-tags">
        <span class="tags__empty">None added yet</span>
      </div>
    </div>

    <!-- Error -->
    <div id="error-container"></div>

    <!-- CTA -->
    <button class="cta" id="cta-btn" onclick="getAdvice()">
      ⚡&nbsp; Get Build Advice
    </button>

    <!-- Advice Output -->
    <div id="advice-container"></div>

    <!-- Ball Reference -->
    <details class="reference" id="reference-details">
      <summary id="ref-summary">📖 Ball reference (<span id="ball-count">0</span> balls)</summary>
      <div class="ref-tabs">
        <button class="ref-tab active" data-filter="top" onclick="filterRef('top', this)">⭐ Top Picks</button>
        <button class="ref-tab" data-filter="all" onclick="filterRef('all', this)">All</button>
        <button class="ref-tab" data-filter="base" onclick="filterRef('base', this)">Base</button>
        <button class="ref-tab" data-filter="evolved" onclick="filterRef('evolved', this)">Evolved</button>
      </div>
      <div class="ref-grid" id="ref-grid"></div>
    </details>

    <!-- Datalist for autocomplete -->
    <datalist id="ball-datalist"></datalist>

  </div>
</div>

<script>
// ========================================================================
// State
// ========================================================================
let allBalls     = [];
let baseBalls    = [];
let evolvedBalls = [];
let topEvolutions = [];
let topFusions   = [];
let currentBalls = [];
let levelUpBalls = [];
let loading      = false;

// ========================================================================
// Initialise
// ========================================================================
(async function init() {
  try {
    const resp = await fetch('/api/balls');
    const data = await resp.json();
    baseBalls    = data.base;
    evolvedBalls = data.evolved;
    topEvolutions = data.top_evolutions || [];
    topFusions   = data.top_fusions || [];
    allBalls     = [...baseBalls, ...evolvedBalls];

    // Populate datalist
    const dl = document.getElementById('ball-datalist');
    allBalls.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.name;
      dl.appendChild(opt);
    });

    document.getElementById('ball-count').textContent = allBalls.length;
    renderReference('top');

    // Restore API key
    const savedKey = localStorage.getItem('bxp_api_key');
    if (savedKey) document.getElementById('api-key-input').value = savedKey;

    // Save key on change
    document.getElementById('api-key-input').addEventListener('input', (e) => {
      localStorage.setItem('bxp_api_key', e.target.value);
    });
  } catch (e) {
    showError('Failed to load ball data.');
  }
})();

// ========================================================================
// Settings
// ========================================================================
function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

// ========================================================================
// Ball Management
// ========================================================================
function addBall(section) {
  const inputEl = document.getElementById(section === 'current' ? 'current-input' : 'levelup-input');
  const list    = section === 'current' ? currentBalls : levelUpBalls;
  const trimmed = inputEl.value.trim();
  if (!trimmed) return;

  const match = allBalls.find(b => b.name.toLowerCase() === trimmed.toLowerCase());
  if (!match) {
    showError(`"${trimmed}" not found. Check spelling.`);
    return;
  }
  if (list.includes(match.name)) {
    showError(`${match.name} is already added.`);
    return;
  }

  list.push(match.name);
  inputEl.value = '';
  clearError();
  renderTags(section);
  inputEl.focus();
}

function removeBall(section, name) {
  const list = section === 'current' ? currentBalls : levelUpBalls;
  const idx  = list.indexOf(name);
  if (idx !== -1) list.splice(idx, 1);
  renderTags(section);
}

function renderTags(section) {
  const container = document.getElementById(section === 'current' ? 'current-tags' : 'levelup-tags');
  const list      = section === 'current' ? currentBalls : levelUpBalls;
  if (list.length === 0) {
    container.innerHTML = '<span class="tags__empty">None added yet</span>';
    return;
  }
  container.innerHTML = list.map(name => `
    <span class="tag">
      ${name}
      <button class="tag__remove" onclick="removeBall('${section}', '${name.replace(/'/g, "\\'")}')" title="Remove">×</button>
    </span>
  `).join('');
}

// ========================================================================
// Get Advice
// ========================================================================
async function getAdvice() {
  if (currentBalls.length === 0 && levelUpBalls.length === 0) {
    showError("Add at least your current balls or level-up options.");
    return;
  }

  

  setLoading(true);
  clearError();
  document.getElementById('advice-container').innerHTML = '';

  try {
    const resp = await fetch('/api/advice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        current_balls: currentBalls,
        level_up_options: levelUpBalls,
        
      }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      showError(data.error || 'Something went wrong.');
    } else {
      renderAdvice(data.structured);
    }
  } catch (e) {
    showError('Failed to get advice. Please try again.');
  }
  setLoading(false);
}

function setLoading(state) {
  loading = state;
  const btn = document.getElementById('cta-btn');
  btn.disabled = state;
  btn.innerHTML = state
    ? '<span class="spinner"></span> Analyzing your build…'
    : '⚡&nbsp; Get Build Advice';
}

// ========================================================================
// Advice Rendering
// ========================================================================
function renderAdvice(structured) {
  if (!structured || structured.best_pick === "None") {
    document.getElementById('advice-container').innerHTML = `
      <div class="advice-card">
        <div class="advice-card__label">⚙️ Algorithmic Recommendation</div>
        <div class="advice-card__body">${escapeHtml(structured?.text_advice || "No advice found.")}</div>
      </div>
    `;
    return;
  }

  let raw = structured.raw_results[structured.best_pick] || {synergies:[], improvements:[]};
  
  let html = `
    <div class="advice-card">
      <div class="advice-card__label">⚙️ Algorithmic Recommendation</div>
      <div style="font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 16px;">
        🎯 Best Pick: ${structured.best_pick}
      </div>
  `;

  if (raw.synergies && raw.synergies.length > 0) {
    html += `<div style="margin-bottom: 12px;">
      <strong style="color: var(--danger); font-size: 13px; text-transform: uppercase; letter-spacing: .1em;">🔥 Immediate Synergies (Win Fast)</strong>
      <ul style="margin-top: 6px; padding-left: 20px; color: #c8d6e8; font-size: 14px;">`;
    raw.synergies.forEach(syn => {
      html += `<li style="margin-bottom: 4px;">Completes <b>${syn}</b>!</li>`;
    });
    html += `</ul></div>`;
  }

  if (raw.improvements && raw.improvements.length > 0) {
    html += `<div>
      <strong style="color: var(--cyan); font-size: 13px; text-transform: uppercase; letter-spacing: .1em;">📈 Evolution Path Finder</strong>
      <div style="color: var(--text-dim); font-size: 12px; margin-top: 4px;">This ball brings you closer to:</div>
      <ul style="margin-top: 6px; padding-left: 20px; color: #c8d6e8; font-size: 14px;">`;
    raw.improvements.slice(0, 5).forEach(imp => {
      html += `<li style="margin-bottom: 4px;">${escapeHtml(imp)}</li>`;
    });
    html += `</ul></div>`;
  }
  
  let runnersUp = Object.keys(structured.raw_results).filter(k => k !== structured.best_pick && structured.raw_results[k].score > 0);
  runnersUp.sort((a,b) => structured.raw_results[b].score - structured.raw_results[a].score);
  
  if (runnersUp.length > 0) {
    html += `<div style="margin-top: 16px; font-size: 13px; color: var(--text-muted);">
      🥈 <b>Runner up:</b> ${runnersUp[0]}
    </div>`;
  }

  html += `</div>`;
  document.getElementById('advice-container').innerHTML = html;
}

// ========================================================================
// Reference Panel
// ========================================================================
function renderReference(filter) {
  const grid = document.getElementById('ref-grid');

  if (filter === 'top') {
    // Render top evolutions + top fusions together
    let html = '';

    // Top Evolutions
    html += '<div class="top-picks-section">';
    html += '<div class="top-picks-heading top-picks-heading--evo">🏆 Top Evolutions</div>';
    html += '<div class="evo-badges">';
    topEvolutions.forEach(name => {
      const ball = allBalls.find(b => b.name === name);
      html += `<span class="evo-badge" title="${ball ? escapeHtml(ball.desc) : ''}">${escapeHtml(name)}</span>`;
    });
    html += '</div></div>';

    // Top Fusions
    html += '<div class="top-picks-section">';
    html += '<div class="top-picks-heading top-picks-heading--fusion">🔮 Top Fusions</div>';
    html += '<div style="display:flex;flex-direction:column;gap:6px;">';
    topFusions.forEach(f => {
      html += `
        <div class="fusion-card">
          <div class="fusion-card__names">
            <span class="fusion-card__ball">${escapeHtml(f.balls[0])}</span>
            <span class="fusion-card__x">×</span>
            <span class="fusion-card__ball">${escapeHtml(f.balls[1])}</span>
          </div>
          <div class="fusion-card__tip">${escapeHtml(f.tip)}</div>
        </div>
      `;
    });
    html += '</div></div>';

    grid.innerHTML = html;
    return;
  }

  let balls;
  if (filter === 'base')         balls = baseBalls;
  else if (filter === 'evolved') balls = evolvedBalls;
  else                           balls = allBalls;

  grid.innerHTML = balls.map(b => `
    <div class="ref-card">
      <span class="ref-card__name">${escapeHtml(b.name)}</span>
      ${b.combo ? `<span class="ref-card__combo">← ${escapeHtml(b.combo)}</span>` : ''}
      <div class="ref-card__desc">${escapeHtml(b.desc)}</div>
    </div>
  `).join('');
}

function filterRef(filter, el) {
  document.querySelectorAll('.ref-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderReference(filter);
}

// ========================================================================
// Error Handling
// ========================================================================
function showError(msg) {
  document.getElementById('error-container').innerHTML = `
    <div class="error-msg">${escapeHtml(msg)}</div>
  `;
}
function clearError() {
  document.getElementById('error-container').innerHTML = '';
}

// ========================================================================
// Utilities
// ========================================================================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
